<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Italia Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="./CSS/styles.css"/>
</head>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top fs-5" class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container-fluid">
              <div>
              <a class="navbar-brand fs-1" href="#">
                <img src="Images/other/Logo.jpg" alt="Logo" width="120" class="d-inline-block align-text-center">
                Café Italia
              </a>
              </div>
              <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav" >
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                  </li>
                  <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                      Menu Items
                    </a>
                    <ul class="dropdown-menu fs-5">
                      <li><a class="dropdown-item" href="#">Beverages</a></li>
                      <hr>
                      <li><a class="dropdown-item" href="#">Deli Style Sandwiches</a></li>
                      <hr>
                      <li><a class="dropdown-item" href="#">Desserts</a></li>
                    </ul>
                    <li class="nav-item">
                      <a class="nav-link" href="#">Coupons</a>
                    </li>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
    </header>
<body>
  <main>
<div class="shield" >
    <div id="carouselFade" class="carousel slide carousel-fade">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="./Images/beverages/Capuchino.jpg" class="d-block w-100" alt="capuchino">
        </div>
        <div class="carousel-item">
          <img src="./Images/pastries/Cannoli.jpg" class="d-block w-100" alt="cannoli">
        </div>
        <div class="carousel-item">
          <img src="./Images/sandwiches/meatball.jpg" class="d-block w-100" alt="meatball">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselFade" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselFade" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </main>
